<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="./styles.css" />
    </head>
    <body>
        <h1>Native Form Validation</h1>

        <!-- required -->
        <form class="demo-form">
        <h2>required</h2>

        <label>
            Required Field
            <input
            type="text"
            required
            placeholder="Leave this empty"
            />
        </label>

        <button type="submit">Submit</button>
        </form>

        <!-- email -->
        <form class="demo-form">
        <h2>type="email"</h2>

        <label>
            Email Address
            <input
            type="email"
            placeholder="not-an-email"
            />
        </label>

        <button type="submit">Submit</button>
        </form>

        <!-- min -->
        <form class="demo-form">
        <h2>min="18"</h2>

        <label>
            Minimum Age
            <input
            type="number"
            min="18"
            placeholder="Try 17"
            />
        </label>

        <button type="submit">Submit</button>
        </form>

        <!-- max -->
        <form class="demo-form">
        <h2>max="100"</h2>

        <label>
            Maximum Value
            <input
            type="number"
            max="100"
            placeholder="Try 101"
            />
        </label>

        <button type="submit">Submit</button>
        </form>

        <!-- pattern -->
        <form class="demo-form">
        <h2>pattern="[A-Za-z]{3,}"</h2>

        <label>
            Username
            <input
            type="text"
            pattern="[A-Za-z]{3,}"
            placeholder="Only letters (3+)"
            title="Please enter at least 3 letters. Numbers and symbols are not allowed."
            />
        </label>

        <button type="submit">Submit</button>
        </form>
    </body>
</html>
