<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="./styles.css" />
    </head>
    <body>
        <h1>Dialog No JavaScript</h1>
        <button command="show-modal" commandfor="myDialog">
        Open Dialog
        </button>

        <dialog id="myDialog">
        <h2>Hello!</h2>
        <p>This dialog was opened without JavaScript.</p>

        <form method="dialog">
            <button>Close</button>
        </form>
        </dialog>
    </body>
</html>
